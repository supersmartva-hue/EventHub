{% extends 'base.html' %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<div class="text-center py-5" style="padding-top:5rem!important">
  <div style="font-size:6rem;font-weight:800;background:var(--gradient);
              -webkit-background-clip:text;-webkit-text-fill-color:transparent;
              background-clip:text;line-height:1">500</div>
  <h2 class="mt-2 fw-700">Server Error</h2>
  <p class="text-muted">Something went wrong on our end. Please try again.</p>
  <a href="{{ url_for('main.home') }}" class="btn btn-primary mt-3">
    <i class="bi bi-house me-2"></i>Back to Home
  </a>
</div>
{% endblock %}
