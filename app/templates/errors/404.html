{% extends 'base.html' %}
{% block title %}404 — Not Found{% endblock %}
{% block content %}
<div class="text-center py-5" style="padding-top:5rem!important">
  <div style="font-size:6rem;font-weight:800;background:var(--gradient);
              -webkit-background-clip:text;-webkit-text-fill-color:transparent;
              background-clip:text;line-height:1">404</div>
  <h2 class="mt-2 fw-700">Page Not Found</h2>
  <p class="text-muted">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{{ url_for('main.home') }}" class="btn btn-primary mt-3">
    <i class="bi bi-house me-2"></i>Back to Home
  </a>
</div>
{% endblock %}
